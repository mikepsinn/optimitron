services:
  postgres:
    image: postgres:16-alpine
    container_name: optimitron-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: optimitron
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - optimitron-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d optimitron"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  optimitron-postgres-data:
